<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Interactive To Do List</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="app">
        <section class="todo-card">
            <h1>My Interactive “Pro” To Do List</h1>
            <p class="subtitle">Task Manager using HTML, CSS, and JavaScript</p>

            <div class="input-section">
                <input
                    type="text"
                    id="taskInput"
                    placeholder="Enter task description"
                    aria-label="Task description"
                >
                <button id="addTaskBtn">Add Task</button>
            </div>

            <div class="controls">
                <div class="filters">
                    <button class="filter-btn active" data-filter="all">All</button>
                    <button class="filter-btn" data-filter="completed">Completed</button>
                    <button class="filter-btn" data-filter="incomplete">Incomplete</button>
                </div>

                <div class="sort-box">
                    <label for="sortSelect">Sort:</label>
                    <select id="sortSelect">
                        <option value="newest">Creation Time (Newest)</option>
                        <option value="oldest">Creation Time (Oldest)</option>
                        <option value="az">Alphabetically (A-Z)</option>
                        <option value="za">Alphabetically (Z-A)</option>
                    </select>
                </div>
            </div>

            <ul id="taskList" class="task-list"></ul>

            <p id="emptyMessage" class="empty-message">No tasks added yet.</p>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
